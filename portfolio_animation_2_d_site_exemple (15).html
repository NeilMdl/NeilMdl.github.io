<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neil MADELAINE - Portfolio</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      overflow-x: hidden;
    }

    /* BACKGROUND */
    .bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 120%;
      background: radial-gradient(circle at 30% 30%, #1a1a1a, #000000);
      z-index: -4;
    }

    /* GRAIN */
    .grain {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
      opacity: 0.12;
      background-image: url('https://grainy-gradients.vercel.app/noise.svg');
      animation: grainMove 0.4s steps(2) infinite;
    }

    @keyframes grainMove {
      0% { transform: translate(0,0); }
      100% { transform: translate(-10%,10%); }
    }

    /* PARTICLES */
    #particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -3;
      pointer-events: none;
    }

    section {
      padding: 120px 20px;
      max-width: 1000px;
      margin: auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
      font-size: 70px;
      letter-spacing: 6px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 48px;
    }

    /* NAME */
    .artist-name {
      text-align: center;
      font-size: 34px;
      letter-spacing: 5px;
      margin-bottom: 60px;
      opacity: 0.9;
    }

    /* FADE SCROLL */
    .fade {
      opacity: 0;
      transform: translateY(40px);
      transition: all 1s ease;
    }

    .fade.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* GALLERY 3 COLUMNS */
    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
    }

    .gallery img {
      width: 100%;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .gallery img:hover {
      transform: scale(1.05);
    }

    video {
      width: 100%;
      border-radius: 10px;
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.92);
      justify-content: center;
      align-items: center;
    }

    .modal img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 10px;
    }

    /* ARROWS BIG FIXED */
    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 110px;
      cursor: pointer;
      user-select: none;
      padding: 30px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
    }

    .arrow.left { left: 20px; }
    .arrow.right { right: 20px; }

  </style>
</head>

<body>

  <div class="bg"></div>
  <div class="grain"></div>
  <canvas id="particles"></canvas>

  <section>
    <h1>PORTFOLIO 2D</h1>
    <div class="artist-name">Neil MADELAINE</div>
  </section>

  <section class="fade">
    <h2>Portfolio</h2>
    <div class="gallery">
      <img src="1INTRO.png">
      <img src="1 invention charadesign.png">
      <img src="2 invention charadesign.png">
      <img src="3 Observation charadesign.png">
      <img src="4 invention charadesign.png">
      <img src="5 Observation stylisation.png">
      <img src="6 Modele vivant.png">
      <img src="7 Morpho.png">
      <img src="8 Observation Croquis.png">
      <img src="9 Observation Croquis.png">
      <img src="10 Observation Mouvement.png">
      <img src="11 Creation Charadesign.png">
      <img src="12 Projet Final.png">
      <img src="13 Projet Final.png">
      <img src="14 Observation Charadesign.png">
      <img src="15 Observation Charadesign.png">
      <img src="16 Invention Layout.png">
      <img src="17 nicolas Charadesign.png">
      <img src="18 Observation Ombrage.png">
      <img src="19 Projet Jo 2024.png">
      <img src="20 Observation Colorisation.png">
      <img src="21 FanArt.png">
      <img src="22 Invention Layout.png">
      <img src="23 Layout.png">
      <img src="24 Board.png">
      <img src="25 Invention Charadesign.png">
      <img src="26 Fin.png">
    </div>
  </section>

  <section class="fade">
    <h2>Bande Démo</h2>
    <video controls>
      <source src="BANDE DEMO 2025 NEIL MADELAINE.mp4" type="video/mp4">
    </video>
  </section>

  <section class="fade">
    <h2>Contact</h2>
    <p style="text-align:center;">neil94madelaine@gmail.com</p>
    <p style="text-align:center;">LinkedIn : Neil Madelaine</p>
  </section>

  <!-- MODAL -->
  <div class="modal" id="modal">
    <span class="arrow left" id="prev">❮</span>
    <img id="modalImg">
    <span class="arrow right" id="next">❯</span>
  </div>

  <script>
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const particles = [];

    for (let i = 0; i < 80; i++) {
      particles.push({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        vx: (Math.random() - 0.5) * 0.4,
        vy: (Math.random() - 0.5) * 0.4,
        r: Math.random() * 2
      });
    }

    let mouse = { x: 0, y: 0 };

    window.addEventListener('mousemove', (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    function animate() {
      ctx.clearRect(0,0,canvas.width,canvas.height);

      for (let p of particles) {
        let dx = mouse.x - p.x;
        let dy = mouse.y - p.y;
        let dist = Math.sqrt(dx*dx + dy*dy);

        if (dist < 120) {
          p.x -= dx * 0.01;
          p.y -= dy * 0.01;
        }

        p.x += p.vx;
        p.y += p.vy;

        if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.fill();
      }

      requestAnimationFrame(animate);
    }

    animate();

    const faders = document.querySelectorAll('.fade');
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) e.target.classList.add('visible');
      });
    }, { threshold: 0.2 });

    faders.forEach(f => observer.observe(f));

    const modal = document.getElementById('modal');
    const modalImg = document.getElementById('modalImg');
    const images = Array.from(document.querySelectorAll('.gallery img'));

    let index = 0;

    function show(i){
      index = (i + images.length) % images.length;
      modalImg.src = images[index].src;
    }

    images.forEach((img,i)=>{
      img.addEventListener('click',()=>{
        modal.style.display='flex';
        show(i);
      });
    });

    document.getElementById('prev').onclick = (e)=>{
      e.stopPropagation();
      show(index-1);
    };

    document.getElementById('next').onclick = (e)=>{
      e.stopPropagation();
      show(index+1);
    };

    modal.addEventListener('click',()=>{
      modal.style.display='none';
    });

  </script>

</body>
</html>
